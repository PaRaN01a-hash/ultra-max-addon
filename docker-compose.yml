services:
  stremio-filtered:
    image: stremio-addon
    container_name: stremio-filtered
    restart: unless-stopped
    environment:
      - TMDB_KEY=${TMDB_KEY}
      - FILTER_MODE=on
      - PORT=7000
    ports:
      - "7000:7000"
    networks:
      - npm_default

  stremio-all:
    image: stremio-addon
    container_name: stremio-all
    restart: unless-stopped
    environment:
      - TMDB_KEY=${TMDB_KEY}
      - FILTER_MODE=off
      - PORT=7000
    ports:
      - "7001:7000"
    networks:
      - npm_default

networks:
  npm_default:
    external: true
